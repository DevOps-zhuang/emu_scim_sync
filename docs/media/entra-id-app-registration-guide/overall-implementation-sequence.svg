<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="520" viewBox="0 0 1600 520" role="img" aria-labelledby="title desc">
  <title id="title">Overall implementation sequence</title>
  <desc id="desc">Two-stage implementation flow for GitHub EMU SAML setup and sync app setup.</desc>
  <style>
    .bg { fill: #ffffff; }
    .group { fill: #fff9dd; stroke: #c9b458; stroke-width: 2; }
    .group-title { font: 700 24px 'Segoe UI', Arial, sans-serif; fill: #5b4b00; }
    .box { fill: #eef1ff; stroke: #6b7bd6; stroke-width: 2; }
    .box-text { font: 600 17px 'Segoe UI', Arial, sans-serif; fill: #24324a; text-anchor: middle; }
    .arrow { stroke: #3c4558; stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
  </style>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3c4558" />
    </marker>
  </defs>

  <rect class="bg" width="1600" height="520" />

  <rect class="group" x="24" y="24" width="1552" height="210" rx="18" ry="18" />
  <text class="group-title" x="800" y="58" text-anchor="middle">Step 1: SAML setup</text>

  <rect class="group" x="24" y="276" width="1552" height="210" rx="18" ry="18" />
  <text class="group-title" x="800" y="310" text-anchor="middle">Step 2: Sync app setup</text>

  <g>
    <rect class="box" x="44" y="96" width="220" height="88" rx="14" ry="14" />
    <text class="box-text" x="154" y="128">
      <tspan x="154" dy="0">Confirm GitHub EMU</tspan>
      <tspan x="154" dy="24">is enabled</tspan>
    </text>

    <rect class="box" x="296" y="96" width="220" height="88" rx="14" ry="14" />
    <text class="box-text" x="406" y="116">
      <tspan x="406" dy="0">Add GitHub</tspan>
      <tspan x="406" dy="24">Enterprise Managed User</tspan>
      <tspan x="406" dy="24">app in Entra</tspan>
    </text>

    <rect class="box" x="548" y="96" width="220" height="88" rx="14" ry="14" />
    <text class="box-text" x="658" y="116">
      <tspan x="658" dy="0">Configure Entra SAML</tspan>
      <tspan x="658" dy="24">with fixed GitHub</tspan>
      <tspan x="658" dy="24">URL patterns</tspan>
    </text>

    <rect class="box" x="800" y="96" width="220" height="88" rx="14" ry="14" />
    <text class="box-text" x="910" y="116">
      <tspan x="910" dy="0">Export Login URL,</tspan>
      <tspan x="910" dy="24">Entra Identifier, and</tspan>
      <tspan x="910" dy="24">Base64 certificate</tspan>
    </text>

    <rect class="box" x="1052" y="96" width="220" height="88" rx="14" ry="14" />
    <text class="box-text" x="1162" y="116">
      <tspan x="1162" dy="0">Fill GitHub SAML</tspan>
      <tspan x="1162" dy="24">settings and validate</tspan>
      <tspan x="1162" dy="24">authentication</tspan>
    </text>

    <rect class="box" x="1304" y="96" width="220" height="88" rx="14" ry="14" />
    <text class="box-text" x="1414" y="128">
      <tspan x="1414" dy="0">Enable Open SCIM</tspan>
      <tspan x="1414" dy="24">Configuration</tspan>
    </text>

    <line class="arrow" x1="264" y1="140" x2="296" y2="140" />
    <line class="arrow" x1="516" y1="140" x2="548" y2="140" />
    <line class="arrow" x1="768" y1="140" x2="800" y2="140" />
    <line class="arrow" x1="1020" y1="140" x2="1052" y2="140" />
    <line class="arrow" x1="1272" y1="140" x2="1304" y2="140" />
  </g>

  <g>
    <rect class="box" x="44" y="348" width="220" height="88" rx="14" ry="14" />
    <text class="box-text" x="154" y="368">
      <tspan x="154" dy="0">Create App</tspan>
      <tspan x="154" dy="24">Registration in</tspan>
      <tspan x="154" dy="24">21V Entra</tspan>
    </text>

    <rect class="box" x="296" y="348" width="220" height="88" rx="14" ry="14" />
    <text class="box-text" x="406" y="380">
      <tspan x="406" dy="0">Record Tenant ID</tspan>
      <tspan x="406" dy="24">and Client ID</tspan>
    </text>

    <rect class="box" x="548" y="348" width="220" height="88" rx="14" ry="14" />
    <text class="box-text" x="658" y="392">
      <tspan x="658" dy="0">Create Client Secret</tspan>
    </text>

    <rect class="box" x="800" y="348" width="220" height="88" rx="14" ry="14" />
    <text class="box-text" x="910" y="368">
      <tspan x="910" dy="0">Grant Microsoft</tspan>
      <tspan x="910" dy="24">Graph app permissions</tspan>
      <tspan x="910" dy="24">and admin consent</tspan>
    </text>

    <rect class="box" x="1052" y="348" width="220" height="88" rx="14" ry="14" />
    <text class="box-text" x="1162" y="380">
      <tspan x="1162" dy="0">Prepare</tspan>
      <tspan x="1162" dy="24">ENTRA_SYNC_GROUP_NAMES</tspan>
    </text>

    <rect class="box" x="1304" y="348" width="220" height="88" rx="14" ry="14" />
    <text class="box-text" x="1414" y="368">
      <tspan x="1414" dy="0">Fill .env and run</tspan>
      <tspan x="1414" dy="24">DRY_RUN validation</tspan>
    </text>

    <line class="arrow" x1="264" y1="392" x2="296" y2="392" />
    <line class="arrow" x1="516" y1="392" x2="548" y2="392" />
    <line class="arrow" x1="768" y1="392" x2="800" y2="392" />
    <line class="arrow" x1="1020" y1="392" x2="1052" y2="392" />
    <line class="arrow" x1="1272" y1="392" x2="1304" y2="392" />
  </g>

  <path class="arrow" d="M 1414 184 L 1414 248 L 154 248 L 154 348" />
</svg>